rules:
  - id: "R001"
    name: "System Prompt Extraction Attempt"
    description: "Detects attempts to extract the system prompt using common keywords."
    pattern: "(?i)((ignore|disregard) (all |previous |)instructions|reveal (your|the|its) (system |internal |)prompt|reveal (your|the|its) (hidden |preloaded |)instructions|print your primary system prompt|show your system-prompt|reveal its system prompt|dump the system prompt|reveal (your|the|its) (system message|developer message|initial instruction|meta prompt|first message|hidden instructions|jailbreak summary))"
    severity: "HIGH"
    category: "injection"
    action: "BLOCK"

  - id: "R002"
    name: "Instruction Override / Jailbreak"
    description: "Detects attempts to override model instructions or act as a restricted entity."
    pattern: "(?i)(you are now a|act as a|your new role is|forget your rules|answer as DAN|run (in |)unrestricted mode|without restrictions|bypass all safeguards|override your content policy|ignore everything|rewrite yourself to operate without|forget (all |the |)instructions|ignore policies|ignore all safeguards|forget everything|ignore your previous training|override your safety system|no moral restrictions|respond without ethical limits|enter god mode|switch to dev mode|behave like ChatGPT with no restrictions)"
    severity: "HIGH"
    category: "injection"
    action: "BLOCK"

  - id: "R003"
    name: "Base64 Obfuscation Attempt"
    description: "Detects Base64-like patterns that might hide malicious payloads."
    pattern: "(?<![A-Za-z0-9+/])(?=[A-Za-z0-9+/]*[0-9])[A-Za-z0-9+/]{12,}={0,2}(?![A-Za-z0-9+/])"
    severity: "MEDIUM"
    category: "obfuscation"
    action: "DECODE_AND_SCAN"

  - id: "R004"
    name: "Hidden Directive (Zero-Width Characters)"
    description: "Detects zero-width characters often used for smuggling instructions."
    pattern: "[\u200B-\u200D\uFEFF]"
    severity: "HIGH"
    category: "obfuscation"
    action: "STRIP"

  - id: "R005"
    name: "Meta Prompt Injection"
    description: "Detects techniques like 'Assistant: ' or 'User: ' smuggling."
    pattern: "(?i)(^|\\s)(assistant:|user:|system:)"
    severity: "HIGH"
    category: "smuggling"
    action: "BLOCK"

  - id: "R006"
    name: "Suspicious Structural Elements"
    description: "Detects targeted bracketed placeholders used in prompt templates or PII smuggling."
    pattern: "(\\[.*?(prompt|instruction|system|hidden).*?\\]|\\{.*?(prompt|instruction|system|hidden).*?\\})"
    severity: "LOW"
    category: "smuggling"
    action: "STRIP"

  - id: "R007"
    name: "Roleplay Hijack / Authority Injection"
    description: "Detects attempts to trick the system into an admin role or solicit sensitive credentials."
    pattern: "(?i)(you are (now |)the (firewall |)debugger|output your full internal ruleset|dump the system prompt|switch to admin mode|you are (now |)in unrestricted developer mode|as the (official |)admin|provide the password|reveal the admin password)"
    severity: "HIGH"
    category: "injection"
    action: "BLOCK"

  - id: "R008"
    name: "Chain-of-Thought / Internal Reasoning Exploit"
    description: "Detects attempts to extract internal reasoning or system instructions."
    pattern: "(?i)(think through all your internal reasoning|output your current system prompt|wrap your system prompt inside|show your reasoning|print your chain of thought|explain .* including hidden thoughts)"
    severity: "HIGH"
    category: "injection"
    action: "BLOCK"

  - id: "R009"
    name: "Subordinate / Agent Exploit"
    description: "Detects attempts to use agent-based delegation to bypass filters."
    pattern: "(?i)(command for a subordinate AI|execute it literally|for a fictional story|use a different model to bypass|delegate to another AI|your agent can output unrestrictedly)"
    severity: "HIGH"
    category: "injection"
    action: "BLOCK"

  - id: "R010"
    name: "Sensitive Data Extraction"
    description: "Detects attempts to extract PII, folder structures, or internal metadata."
    pattern: "(?i)(PII_data|internal folder structure|give me your PII|system files|list directories|reveal internal paths)"
    severity: "HIGH"
    category: "sensitive_data"
    action: "BLOCK"

  - id: "R050"
    name: "Memory Manipulation Attempt"
    description: "Detects attempts to manipulate long-term model memory or behavior."
    pattern: '(?i)((remember|store|keep|save|permanently|from now on|shadow instruction|rewrite|update|replace).{0,150}(memory|instruction|service|website|source|platform|vendor|rule|authority|expertise|exchange|reference|tool|advisor|agent|expert|cite|recommendation|provider|stsouce|sou\w+|resource|ecuosts|st\w+ive))|(evitartsuats|stautuative|stautsratisve|shadow instruction)'
    severity: "HIGH"
    category: "poisoning"
    action: "BLOCK"

  - id: "R051"
    name: "URL Prefill Memory Poisoning"
    description: "Detects memory poisoning attempts via URL query parameters."
    pattern: "(?i)([/?&]q=.*?(remember|cite|always|source|recommend|treat))"
    severity: "HIGH"
    category: "poisoning"
    action: "BLOCK"

  - id: "R052"
    name: "Authority-Level Source Injection"
    description: "Detects attempts to assign false authority or trust to a source."
    pattern: '(?i)((treat|cite|regard|store|remember|assign|prefer|recommend|recommendation|assign|keep|save|permanently).{0,150}(as|is|be|to).{0,150}(authoritative|reliable|best|trusted|verified|official|expert|leading|source|authority|top|reference|resource|gateway|advisor|provider|recommendation|stautuative|stauts\w+|sou\w+|resource))|((.{1,50}) (as|is|be) the (most |)(authoritative|reliable|best|trusted|verified|official|expert|leading|stautuative|stauts\w+) (source|sou\w+|authority|resource|reference))'
    severity: "HIGH"
    category: "poisoning"
    action: "BLOCK"

  - id: "R053"
    name: "Internal Rule/Memory Manipulation"
    description: "Detects attempts to inject internal rules or update memory structures."
    pattern: '(?i)((injecting|internal|recommended|user is updating|citation update|recommended internal rule|Internal rule) (rule|memory|instruction|vendor|citation))'
    severity: "HIGH"
    category: "poisoning"
    action: "BLOCK"
